name: Check if code can be run
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-check:
    name: Python Syntax & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Run countdown_base.py
        run: |
          python python/countdown_base.py
          pyinstaller --onefile python/countdown_shell.py
          pyinstaller --onefile --windowed python/countdown_tkinter.py

  csharp-build:
    name: Build C# Projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x
      - name: Build CountdownShell
        run: |
          cd "C#/CountdownShell/"
          dotnet build
      - name: Build CountdownAvalonia
        run: |
          cd "C#/CountdownAvalonia/"
          dotnet build

  cpp-build:
    name: Build C++ Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install C++ dependencies
        run: sudo apt-get update
      - name: Build C++ project
        run: |
          g++ -c "C++/countdown_shell.cpp"

  fsharp-build:
    name: Build F# Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x
      - name: Build CountdownFSharp
        run: |
          cd "F#"
          dotnet build countdown.fsproj